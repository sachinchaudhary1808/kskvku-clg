<html>
    <body>
        <label for="input">Enter the Number</label>
        <input type="number" id="input" >
        <button onclick="checkArmstrong()" type="button">Check</button>
        <h3 id="result">Empty</h3>
    </body>
    <script>
        function checkArmstrong(){
            let input = Number(document.getElementById("input").value);
            let result = document.getElementById("result");

            let str = input.toString();
            let power = str.length;
            let sum = 0;

            for (let digit of str){
                sum += Math.pow(Number(digit),power);
            }


            if(!input){
                alert("Number Is Not Entered")
            }
            else if (input == sum){
                result.innerHTML = "is ArmStrong";
            }else{
                result.innerHTML = "not ArmStrong";
            }
        }
    </script>
</html>
