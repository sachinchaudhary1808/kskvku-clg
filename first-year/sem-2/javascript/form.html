<!DOCTYPE html>
<html>
<head>
    <title>Smart Form</title>
    <style>
        .error { color: red; }
    </style>
</head>
<body>

<h2>Smart Form</h2>

<form onsubmit="return validateForm()">

    Name: <input type="text" id="name"><br><br>

    Username:
    <input type="text" id="username">
    <button type="button" onclick="copyName()">Copy Name</button>
    <br><br>

    Email: <input type="text" id="email"><br><br>

    Password: <input type="password" id="pass"><br><br>

    Confirm Password: <input type="password" id="cpass"><br><br>

    Gender:
    <input type="radio" name="gender">Male
    <input type="radio" name="gender">Female
    <br><br>

    <!-- 🔹 City Jump Menu -->
    Select City:
    <select id="city" onchange="showCity(this.value)">
        <option value="">Choose City</option>
        <option value="Gandhidham">Gandhidham</option>
        <option value="Ahmedabad">Ahmedabad</option>
        <option value="Mumbai">Mumbai</option>
    </select>

    <p id="cityMsg"></p>

    <br>

    <p id="error" class="error"></p>

    <button type="submit">Submit</button>

</form>

<script>

// 🔹 Copy Name → Username
function copyName() {
    document.getElementById("username").value =
        document.getElementById("name").value;
}

// 🔹 City Jump Menu (no redirect, just display)
function showCity(city) {
    if (city) {
        document.getElementById("cityMsg").innerText =
            "You selected: " + city;
    }
}

// 🔹 Validation
function validateForm() {

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let pass = document.getElementById("pass").value;
    let cpass = document.getElementById("cpass").value;
    let city = document.getElementById("city").value;
    let error = document.getElementById("error");

    let pattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

    // Required fields
    if (name === "" || email === "" || pass === "" || cpass === "" || city === "") {
        error.innerText = "All fields including city are required!";
        return false;
    }

    // Email validation
    if (!pattern.test(email)) {
        error.innerText = "Invalid email!";
        return false;
    }

    // Password match
    if (pass !== cpass) {
        error.innerText = "Passwords do not match!";
        return false;
    }

    // Radio check
    let radios = document.getElementsByName("gender");
    let selected = false;

    for (let r of radios) {
        if (r.checked) selected = true;
    }

    if (!selected) {
        error.innerText = "Select gender!";
        return false;
    }

    alert("Form submitted successfully!");
    return true;
}

</script>

</body>
</html>
